name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for Trusted Publisher (OIDC) support
        run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm check:publish-config
      - run: pnpm check:exports
      - name: Compute release PR title
        id: pr-title
        run: |
          pnpm changeset status --output=changeset-status.json || true
          title=$(node -e '
            const fs = require("fs");
            let title = "Version Packages";
            try {
              const { releases = [] } = JSON.parse(fs.readFileSync("changeset-status.json", "utf8"));
              const parts = releases
                .filter((release) => release.type !== "none")
                .map((release) => `${release.name.replace(/^@[^/]+\//, "")}@${release.newVersion}`);
              if (parts.length) title = `Release - ${parts.join(", ")}`;
            } catch {}
            console.log(title);
          ')
          rm -f changeset-status.json
          echo "title=$title" >> "$GITHUB_OUTPUT"
      - uses: changesets/action@v1
        with:
          publish: pnpm run release
          version: pnpm run version
          title: ${{ steps.pr-title.outputs.title }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          NPM_CONFIG_PROVENANCE: true
