name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve affected packages & matrix
    if: github.head_ref == 'changeset-release/main'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      filterArgs: ${{ steps.resolve.outputs.filterArgs }}
      hasWork: ${{ steps.resolve.outputs.hasWork }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: resolve
        run: node scripts/resolve-ci-matrix.mjs

  check:
    name: Lint / Typecheck / Build
    needs: [resolve]
    if: needs.resolve.outputs.hasWork == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Repo-wide checks — cheap and cross-cutting, always run.
      - run: pnpm format:check
      - run: pnpm check:use-client
      - run: pnpm check:publish-config
      # Per-package checks — scoped to the packages this PR affects.
      - run: pnpm ${{ needs.resolve.outputs.filterArgs }} --if-present lint
      - run: pnpm ${{ needs.resolve.outputs.filterArgs }} --if-present typecheck
      - run: pnpm ${{ needs.resolve.outputs.filterArgs }} --if-present build
      - run: pnpm ${{ needs.resolve.outputs.filterArgs }} --if-present check:exports
      - run: pnpm ${{ needs.resolve.outputs.filterArgs }} --if-present test:peer

  peer-matrix:
    name: ${{ matrix.package }} @ payload ${{ matrix.payloadVersion }} (${{ matrix.label }})
    needs: [check, resolve]
    if: needs.resolve.outputs.hasWork == 'true' && needs.resolve.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Pin Payload to ${{ matrix.payloadVersion }}
        run: node scripts/apply-payload-version.mjs ${{ matrix.payloadVersion }}
      - run: pnpm install --no-frozen-lockfile
      - name: Build ${{ matrix.package }}
        run: pnpm --filter ${{ matrix.package }} build
      - name: Peer smoke test (if defined)
        run: pnpm --filter ${{ matrix.package }} --if-present test:peer

  ci-gate:
    name: CI Gate
    needs: [check, peer-matrix]
    if: always() && github.head_ref == 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          check="${{ needs.check.result }}"
          peer="${{ needs.peer-matrix.result }}"
          echo "check=$check peer-matrix=$peer"
          # 'skipped' is acceptable (nothing to run for that job); only real
          # failures or cancellations should fail the gate.
          for result in "$check" "$peer"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              exit 1
            fi
          done
