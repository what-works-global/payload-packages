name: Feature request
description: Suggest a new feature or improvement for a @whatworks package
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe what you'd like and why it would be useful.

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is this request for? (Pick "New package / not sure" if it doesn't fit an existing one.)
      options:
        - "@whatworks/payload-activity-log"
        - "@whatworks/payload-algolia-search"
        - "@whatworks/analytics"
        - "@whatworks/payload-audit-fields"
        - "@whatworks/payload-block-settings"
        - "@whatworks/payload-heading-field"
        - "@whatworks/payload-utilities"
        - "@whatworks/payload-rbac"
        - "@whatworks/payload-redirects"
        - "@whatworks/payload-select-search-field"
        - "@whatworks/payload-sitemap"
        - "@whatworks/payload-switch-env"
        - "New package / not sure"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or use case. What are you trying to do that's hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen. API sketches or config examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried or considered.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this hasn't already been requested.
          required: true
